<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}VeritasCode{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/style.css" />

    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f5f7fa;
      }

      /* NAVBAR */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 20px; /* 🔥 mais fina */
        background: #36b694;
        color: white;
      }

      /* LOGO */
      .logo {
        font-size: 18px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 8px;
        color: white;
      }

      .logo-icon {
        font-weight: bold;
      }

      /* BOTÃO MENU */
      .menu-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 3px;
      }

      /* HAMBURGER */
      .hamburger {
        width: 20px;
        height: 2px;
        background: white;
        margin: 2px 0; /* 🔥 linhas mais próximas */
        border-radius: 2px;
      }

      /* SIDEBAR */
      .sidebar {
        height: 100%;
        width: 0;
        position: fixed;
        top: 0;
        left: 0;
        background-color: #2c3e50;
        overflow-x: hidden;
        transition: 0.3s;
        padding-top: 60px;
        z-index: 999;
      }

      .sidebar a {
        padding: 10px 20px;
        display: block;
        color: white;
        text-decoration: none;
        transition: 0.2s;
      }

      .sidebar a:hover {
        background: #36b694;
      }

      .close-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 25px;
        color: white;
        cursor: pointer;
      }

      /* OVERLAY */
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        display: none;
        z-index: 998;
      }

      /* CONTEÚDO */
      main {
        padding: 20px;
      }

      /* FOOTER */
      footer {
        margin-top: 40px;
        padding: 20px;
        text-align: center;
        background: #f1f1f1;
        font-size: 14px;
        color: #666;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
        <div class="hamburger"></div>
        <div class="hamburger"></div>
        <div class="hamburger"></div>
      </button>

      <div class="logo">
        <span class="logo-icon">
          &#123;
          <span style="transform: rotate(-90deg); display: inline-block">
            &#8764;
          </span>
          &#125;
        </span>
        VeritasCode
      </div>

      <div></div>
    </header>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
      <span class="close-btn" onclick="closeSidebar()">×</span>

      <h3 style="padding: 10px; color: white">Menu</h3>

      <a href="/">Dashboard</a>
      <a href="/ranking">Ranking</a>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" onclick="closeSidebar()"></div>

    <!-- CONTEÚDO -->
    <main>{% block content %}{% endblock %}</main>

    <!-- FOOTER -->
    <footer>© 2026 - VeritasCode</footer>

    <!-- SCRIPT -->
    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        if (sidebar.style.width === "250px") {
          sidebar.style.width = "0";
          overlay.style.display = "none";
        } else {
          sidebar.style.width = "250px";
          overlay.style.display = "block";
        }
      }

      function closeSidebar() {
        document.getElementById("sidebar").style.width = "0";
        document.getElementById("overlay").style.display = "none";
      }
    </script>
  </body>
</html>
