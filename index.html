<!-- ===================== index.html ===================== -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar Cidadão v1</title>

  <!-- Importando CSS externo -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header class="topbar">
      <div class="brand">
        <h1>Radar Cidadão</h1>
        <p>Filtro de deputados candidatos à reeleição</p>
      </div>
      <div class="status-pill">v1</div>
    </header>

    <main class="layout">

      <!-- FILTROS -->
      <aside class="card filters">
        <h2>Filtros</h2>

        <div class="field">
          <label>Nome</label>
          <input type="text" id="nome" placeholder="Digite um nome" />
        </div>

        <div class="field">
          <label>Estado</label>
          <select id="estado">
            <option value="">Todos</option>
          </select>
        </div>

        <div class="field">
          <label>Partido</label>
          <select id="partido">
            <option value="">Todos</option>
          </select>
        </div>

        <div class="actions">
          <button id="filtrarBtn" class="btn-primary">Filtrar</button>
          <button id="limparBtn" class="btn-secondary">Limpar</button>
        </div>
      </aside>

      <!-- CONTEÚDO -->
      <section class="right-column">

        <section class="stats">
          <div class="card stat-card">
            <span>Total</span>
            <strong id="totalExibido">0</strong>
          </div>

          <div class="card stat-card">
            <span>Estados</span>
            <strong id="estadosEncontrados">0</strong>
          </div>

          <div class="card stat-card">
            <span>Partidos</span>
            <strong id="partidosEncontrados">0</strong>
          </div>
        </section>

        <section class="card list-card">
          <div class="list-head">
            <h3>Deputados</h3>
            <div id="resultadoTexto">0 resultados</div>
          </div>

          <div id="listaDeputados" class="deputados-grid"></div>
        </section>

      </section>
    </main>
  </div>

  <!-- SCRIPT -->
  <script>
    const deputados = [
      { nome: "Tabata Amaral", estado: "SP", partido: "PSB", reeleicao: true },
      { nome: "Kim Kataguiri", estado: "SP", partido: "UNIÃO", reeleicao: true },
      { nome: "Erika Hilton", estado: "SP", partido: "PSOL", reeleicao: true },
      { nome: "Alice Portugal", estado: "BA", partido: "PCdoB", reeleicao: true }
    ];

    const nomeInput = document.getElementById("nome");
    const estadoSelect = document.getElementById("estado");
    const partidoSelect = document.getElementById("partido");
    const lista = document.getElementById("listaDeputados");

    function preencherSelects() {
      const estados = [...new Set(deputados.map(d => d.estado))];
      const partidos = [...new Set(deputados.map(d => d.partido))];

      estados.forEach(e => estadoSelect.innerHTML += `<option>${e}</option>`);
      partidos.forEach(p => partidoSelect.innerHTML += `<option>${p}</option>`);
    }

    function filtrar() {
      const nome = nomeInput.value.toLowerCase();
      const estado = estadoSelect.value;
      const partido = partidoSelect.value;

      const filtrados = deputados.filter(d =>
        d.nome.toLowerCase().includes(nome) &&
        (!estado || d.estado === estado) &&
        (!partido || d.partido === partido)
      );

      render(filtrados);
    }

    function render(listaDados) {
      lista.innerHTML = "";

      listaDados.forEach(d => {
        lista.innerHTML += `
          <div class="deputado-item">
            <h4>${d.nome}</h4>
            <p>${d.estado} • ${d.partido}</p>
          </div>
        `;
      });

      document.getElementById("totalExibido").textContent = listaDados.length;
      document.getElementById("resultadoTexto").textContent = listaDados.length + " resultados";
    }

    document.getElementById("limparBtn").onclick = () => {
      nomeInput.value = "";
      estadoSelect.value = "";
      partidoSelect.value = "";
      filtrar();
    };

    nomeInput.oninput = filtrar;
    estadoSelect.onchange = filtrar;
    partidoSelect.onchange = filtrar;

    preencherSelects();
    filtrar();
  </script>
</body>
</html>
